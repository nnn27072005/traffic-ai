# configs/train_helmet.yaml — chỉ thay đổi 2 dòng so với trước
model: yolov10s.pt
data: /kaggle/working/traffic-ai/configs/helmet.yaml
imgsz: 640
epochs: 50
batch: 16
workers: 4
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
hsv_h: 0.015
hsv_s: 0.3          # dataset đã grayscale → giảm saturation aug
hsv_v: 0.3
degrees: 10.0
translate: 0.1
scale: 0.4
shear: 1.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.05
copy_paste: 0.0     # dataset nhỏ, copy_paste dễ tạo artifact
box: 7.5
cls: 0.5
dfl: 1.5
dropout: 0.0
project: /kaggle/working/traffic-ai/runs/train
name: helmet-yolov10s-640
save_period: 10